<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Variable</title>
    <style>
        :root {
            --primary-color: steelblue;
            --secondary-color: blue;
            --font-size: 20px;
        }

        h3 {
            color: var(--secondary-color);
        }

        h5 {
            background-color: var(--primary-color);
        }

        .box {
            border: 1px solid var(--secondary-color);
            width: calc(100% - 300px);
        }

        .box p {
            color: var(--primary-color);
            font-size: var(--font-size);
        }
    </style>
</head>

<body>
    <h1>My Custom properties</h1>
    <h5>Also known as CSS variables</h5>
    <div class="box">
        <h3>I'm doing something</h3>
        <p>
            Lorem ipsum dolor, sit amet consectetur adipisicing elit. Vel sunt culpa nemo natus quam voluptatem id
            soluta ipsam, corporis cum expedita facere dolor illo ullam voluptas. Voluptatibus molestias tempora
            praesentium?
        </p>
    </div>
</body>

</html>
