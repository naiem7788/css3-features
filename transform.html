<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        .container,
        .inner {
            width: 200px;
            height: 200px;
        }

        .container {
            border: 1px solid steelblue;
            background-color: aquamarine;
        }

        .inner {
            border: 1px solid brown;
            background-color: palegoldenrod;
            /* transform: scale(.50, .75) translateX(100px */
            /* )translateY(-150px) rotate(45deg); */
        }

        .inner:hover {
            transform: translateY(-150px) scale(0.5) rotate(45deg);
        }
    </style>
</head>

<body>
    <h2>Explore Transform and translate</h2>
    <div class="container">Container 1
        <div class="inner">Inner 1</div>
    </div>
    <div class="container">Container 2
        <div class="inner">Inner 2</div>
    </div>
    <div class="container">Container 3
        <div class="inner">Inner 3</div>
    </div>
</body>

</html>
